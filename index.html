<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web login landing page </title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="signupbox">
        <h2>Sign Up</h2>
         <form action="">
             <input type="text" name="fname"  placeholder="FIRST NAME" required > <br><br>
             <input type="text" name="lname" id="lname" placeholder="LAST NAME"required> <br><br>
             <input type="password" name="pword" id="password" placeholder="CONFIRM PASSWORD"required> <br><br>
             <input type="number" name="number" id="number" placeholder="PHONE NUMBER"required> <br><br>
             <input type="email" name="email" id="email" placeholder="EMAIL"required> <br><br>
             <button>SUBMIT</button>

             <div class="sign-in">
                <p >Alerady have an account? <a href="#">Sign-In</a></p>
             </div>


                    
            









         </form>
    </div>
</body>
</html>
